services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skillgap}
      POSTGRES_USER: ${POSTGRES_USER:-skillgap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillgap}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-skillgap} -d ${POSTGRES_DB:-skillgap}"
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-skillgap}:${POSTGRES_PASSWORD:-skillgap}@db:5432/${POSTGRES_DB:-skillgap}
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8123"
      ]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8123}:8123"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8123/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  bot:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8123
    command: ["python", "-m", "bot.main"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
